<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Educational Demo Projects</title>

  <!-- Prevent indexing -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">

  <!-- Block form submission globally -->

        content="default-src 'self'; form-action 'none';">

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#fff3cd;
      font-family:Arial, sans-serif;
    }
    .box{
      background:#fff;
      padding:30px;
      max-width:600px;
      border:1px solid #f0c36d;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>⚠️ Educational / Demo Projects</h2>
    <p>
      This GitHub Pages domain hosts <strong>learning and UI practice projects only</strong>.
    </p>
    <p>
      No real authentication, data collection, or backend services exist.
    </p>
    <p>
      Any login forms are <strong>non-functional demos</strong>.
    </p>
  </div>
</body>
</html>
